name: Build and Publish

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish package to GitHub Packages"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Jest render tests
        run: npm run test:jest

      - name: Build package
        run: npm run build

      - name: Build integrated example
        run: npm run build:example
        env:
          VITE_FIREBASE_API_KEY: ${{ vars.DECK_EXAMPLE_FIREBASE_API_KEY || secrets.DECK_EXAMPLE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.DECK_EXAMPLE_FIREBASE_AUTH_DOMAIN || secrets.DECK_EXAMPLE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.DECK_EXAMPLE_FIREBASE_PROJECT_ID || secrets.DECK_EXAMPLE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.DECK_EXAMPLE_FIREBASE_STORAGE_BUCKET || secrets.DECK_EXAMPLE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.DECK_EXAMPLE_FIREBASE_MESSAGING_SENDER_ID || secrets.DECK_EXAMPLE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ vars.DECK_EXAMPLE_FIREBASE_APP_ID || secrets.DECK_EXAMPLE_FIREBASE_APP_ID }}

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: deck-runtime-dist
          path: dist

      - name: Upload integrated example artifact
        uses: actions/upload-artifact@v4
        with:
          name: deck-runtime-integrated-example
          path: dist-example

  publish:
    name: Publish to GitHub Packages
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish == 'true')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Setup Node for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: "@bjalon"

      - name: Check published package version
        id: package_version
        shell: bash
        run: |
          set -euo pipefail

          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
            echo "Package ${PACKAGE_NAME}@${PACKAGE_VERSION} already exists on GitHub Packages. Publish will be skipped."
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
            echo "Package ${PACKAGE_NAME}@${PACKAGE_VERSION} is not published yet."
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish package
        if: steps.package_version.outputs.exists != 'true'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-example-page:
    name: Deploy Integrated Example
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build integrated example
        run: npm run build:example
        env:
          VITE_FIREBASE_API_KEY: ${{ vars.DECK_EXAMPLE_FIREBASE_API_KEY || secrets.DECK_EXAMPLE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.DECK_EXAMPLE_FIREBASE_AUTH_DOMAIN || secrets.DECK_EXAMPLE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.DECK_EXAMPLE_FIREBASE_PROJECT_ID || secrets.DECK_EXAMPLE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.DECK_EXAMPLE_FIREBASE_STORAGE_BUCKET || secrets.DECK_EXAMPLE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.DECK_EXAMPLE_FIREBASE_MESSAGING_SENDER_ID || secrets.DECK_EXAMPLE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ vars.DECK_EXAMPLE_FIREBASE_APP_ID || secrets.DECK_EXAMPLE_FIREBASE_APP_ID }}

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist-example

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
