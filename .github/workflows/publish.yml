name: Build and Publish

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish package to GitHub Packages"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Jest render tests
        run: npm run test:jest

      - name: Build package
        run: npm run build

      - name: Build integrated example
        run: npm run build:example

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: deck-runtime-dist
          path: dist

      - name: Upload integrated example artifact
        uses: actions/upload-artifact@v4
        with:
          name: deck-runtime-integrated-example
          path: dist-example

  publish:
    name: Publish to GitHub Packages
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish == 'true')
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check package token
        run: |
          if [ -z "${QASTIA_PACKAGES_TOKEN}" ]; then
            echo "::error::Missing QASTIA_PACKAGES_TOKEN. Create a GitHub Actions secret containing a PAT allowed to publish packages under the qastia namespace."
            exit 1
          fi
        env:
          QASTIA_PACKAGES_TOKEN: ${{ secrets.QASTIA_PACKAGES_TOKEN }}

      - name: Setup Node for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: "@qastia"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Publish package
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.QASTIA_PACKAGES_TOKEN }}

  deploy-example-page:
    name: Deploy Integrated Example
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build integrated example
        run: npm run build:example

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist-example

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
